version: '3.9'

services:
  postgres:
    image: postgres:13.2
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - data:/var/lib/postgresql/data
    networks:
      - app_network
  
  pg-admin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_LISTEN_PORT = 5050
    ports:
      - 5050:80
    networks:
      - app_network


  surrealdb:
    image: surrealdb/surrealdb:nightly
    environment:
    - POSTGRES_USER=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
    - 8000:8000
    volumes:
    - surrealdbdata:/var/lib/surrealdb/data
    command: "start --user ${POSTGRES_USER} --pass ${POSTGRES_PASSWORD} --log full file://var/lib/surrealdbdata/data"
    networks:
      - app_network



  nextjs-app:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: nextjs-app
    environment:
      - CHOKIDAR_USEPOLLING=true
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - 3000:3000
    networks:
      - app_network


  rust-server:
    build:
      context: ./userserver
      dockerfile: Dockerfile
    container_name: rustserver-dc
    ports:
      - 10000:10000
    networks:
      - app_network
    volumes:
      - './userserver:/usr/src/userserver'
      - '/usr/src/userserver/target'
    environment:
      - MY_LOG_LEVEL=info
      - MY_LOG_STYLE=Always
      - DATABASE_URL=${DATABASE_URL}
      - EMAIL_VERIFICATION_SECRET=${EMAIL_VERIFICATION_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISH_KEY=${STRIPE_PUBLISH_KEY}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - RESET_PASSWORD_SECRET=${RESET_PASSWORD_SECRET}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - EMAIL_PASSWORD_SECRET=${EMAIL_PASSWORD_SECRET}

    depends_on:
      - postgres

  rust-surreal-server:
    build:
      context: ./surrealserver
      dockerfile: Dockerfile
    container_name: rustserver-dc-surreal
    ports:
      - 11000:11000
    networks:
      - app_network
    restart: always
    volumes:
      - './surrealserver:/usr/src/surrealserver'
      - '/usr/src/surrealserver/target'
    environment:
      - MY_LOG_LEVEL=info
      - MY_LOG_STYLE=Always
      - DATABASE_URL=${DATABASE_URL}
      - EMAIL_VERIFICATION_SECRET=${EMAIL_VERIFICATION_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISH_KEY=${STRIPE_PUBLISH_KEY}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - RESET_PASSWORD_SECRET=${RESET_PASSWORD_SECRET}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - EMAIL_PASSWORD_SECRET=${EMAIL_PASSWORD_SECRET}

    depends_on:
      - surrealdb


networks:
  app_network:
    driver: bridge
    

volumes:
  data:
  surrealdbdata:


